# Newt Configuration for Enterprise Compliance Template

# Strict metric thresholds for enterprise quality
thresholds:
  lines_of_code:
    typescript: 250
    javascript: 200
    python: 200
    java: 300
  public_methods:
    typescript: 12
    javascript: 10
    python: 10
    java: 15
  cyclomatic_complexity:
    typescript: 6
    javascript: 6
    python: 5
    java: 8
  fan_in_out:
    max: 6

# Enterprise architecture patterns
architecture:
  preferred_patterns:
    - layered-architecture
    - hexagonal-architecture
    - microservices
    - event-sourcing
  
  anti_patterns:
    - god-class
    - circular-dependencies
    - tight-coupling
    - shared-mutable-state
  
  layering:
    enforce: true
    strict_mode: true
    layers:
      - presentation
      - application
      - domain
      - infrastructure
      - persistence
  
  documentation:
    adr_required: true
    api_docs_required: true
    architecture_diagrams: true

# Comprehensive security policies
security:
  scan_on_commit: true
  scan_on_pr: true
  block_on_critical: true
  block_on_high: true
  
  checks:
    - sql-injection
    - xss
    - csrf
    - secrets-in-code
    - insecure-dependencies
    - authentication-bypass
    - authorization-flaws
    - sensitive-data-exposure
    - xxe
    - broken-access-control
    - security-misconfiguration
    - insecure-deserialization
    - insufficient-logging
  
  owasp_compliance: true
  owasp_top_10: true
  
  secrets_management:
    enforce: true
    vault_required: true
    allowed_locations:
      - vault://
      - env://
    
  encryption:
    at_rest_required: true
    in_transit_required: true
    key_rotation_days: 90
  
  authentication:
    mfa_required: true
    password_policy: strict
    session_timeout_minutes: 30
  
  authorization:
    rbac_required: true
    least_privilege: true
    audit_access: true

# Performance with SLA requirements
performance:
  monitoring: true
  sla_enforcement: true
  
  budgets:
    api_response_time_ms: 100
    api_p99_ms: 500
    page_load_time_ms: 1000
    database_query_ms: 50
    cache_hit_rate_pct: 95
  
  checks:
    - n-plus-one-queries
    - blocking-operations
    - memory-leaks
    - inefficient-algorithms
    - missing-indexes
    - unbounded-queries
  
  sla_targets:
    availability_pct: 99.9
    error_rate_pct: 0.1
    response_time_p95_ms: 200

# Review orchestration
orchestration:
  parallel_agents: true
  timeout_seconds: 600
  
  agent_priority:
    - security-auditor
    - compliance-checker
    - architecture-analyst
    - performance-analyzer
  
  fail_fast: true
  comprehensive_mode: true

# Strict review policies
review_policies:
  auto_review_on_commit: true
  auto_review_on_pr: true
  manual_review_required: true
  
  pr_size_limits:
    max_files_changed: 20
    max_lines_changed: 500
    suggest_split_above: 300
  
  required_reviewers:
    critical_files: 3
    security_files: 2
    normal_files: 2
  
  approval_requirements:
    security_team: true
    architecture_team: true
    compliance_team: true
  
  quality_gates:
    min_health_score: 85
    min_security_score: 90
    min_test_coverage: 90
    block_on_critical_issues: true
    block_on_high_issues: true
    block_on_security_issues: true

# Compliance configuration
compliance:
  frameworks:
    soc2:
      enabled: true
      controls:
        cc1: true  # Control Environment
        cc2: true  # Communication
        cc3: true  # Risk Assessment
        cc4: true  # Monitoring
        cc5: true  # Control Activities
        cc6: true  # Logical Access
        cc7: true  # System Operations
        cc8: true  # Change Management
        cc9: true  # Risk Mitigation
    
    gdpr:
      enabled: true
      requirements:
        data_minimization: true
        consent_management: true
        right_to_erasure: true
        data_portability: true
        breach_notification: true
        privacy_by_design: true
    
    hipaa:
      enabled: false
      safeguards:
        administrative: true
        physical: true
        technical: true
    
    iso27001:
      enabled: false
      controls: []
  
  audit_trail:
    enabled: true
    immutable: true
    retention_days: 2555  # 7 years
    encryption: true
  
  reporting:
    automated: true
    frequency: weekly
    formats:
      - pdf
      - json
      - markdown

# Logging with audit requirements
logging:
  enabled: true
  level: debug
  
  destinations:
    - file
    - siem
    - audit-log
  
  retention_days: 2555  # 7 years
  encryption: true
  immutable: true
  
  audit_events:
    - authentication
    - authorization
    - data_access
    - data_modification
    - configuration_changes
    - security_events
    - compliance_events
  
  formats:
    review: markdown
    audit: json
    compliance: pdf

# Integrations
integrations:
  azure_devops:
    enabled: true
    work_items: true
    boards: true
    pipelines: true
  
  security_tools:
    sonarqube: true
    snyk: true
    checkmarx: false
    veracode: false
  
  compliance_tools:
    vanta: false
    drata: false
    secureframe: false
  
  monitoring:
    datadog: false
    newrelic: false
    splunk: true
    elk: true
  
  incident_response:
    pagerduty: true
    opsgenie: false

# Enterprise-specific settings
enterprise_features:
  change_management:
    enabled: true
    approval_required: true
    change_advisory_board: true
    emergency_changes: true
  
  incident_response:
    enabled: true
    runbooks: true
    post_mortem_required: true
    sla_tracking: true
  
  disaster_recovery:
    enabled: true
    rpo_minutes: 60
    rto_minutes: 240
    backup_frequency: daily
    backup_retention_days: 90
  
  business_continuity:
    enabled: true
    failover_automatic: true
    multi_region: true
  
  access_control:
    rbac: true
    mfa_required: true
    privileged_access_management: true
    just_in_time_access: true
  
  data_governance:
    classification_required: true
    retention_policies: true
    data_lineage: true
    privacy_impact_assessment: true
